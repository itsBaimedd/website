<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>baimed</title>
    <meta property="og:title" content="Baimed" />
    <meta property="og:description" content="i move different, that’s the difference." />
    <meta property="og:url" content="https://biotap.cc/baimed" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://biotap.cc/baimed/assets/pfp.gif" />
    <link rel="canonical" href="https://biotap.cc/baimed" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Baimed" />
    <meta name="twitter:description" content="i move different, that’s the difference." />
    <meta name="twitter:image" content="https://biotap.cc/baimed/assets/pfp.gif" />
    <link rel="stylesheet" href="./baimed/style.css" />
    <style>
        :root {
            --site-cursor: url("./baimed/assets/cursor.cur") 16 16, auto;
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bgvid">
        <source src="./baimed/assets/background.mp4" type="video/mp4" />
        <source src="https://website-1ir.pages.dev/assets/background.mp4" type="video/mp4" />
    </video>
    <audio id="bgmusic" loop>
        <source src="./baimed/assets/backgroundmusic.mp3" type="audio/mpeg" />
    </audio>

    <div id="bg-overlay"></div>
    <canvas id="particles"></canvas>
    <div id="cursor-light"></div>

    <div id="intro">
        <div id="heart">♡</div>
        <div id="enter">click to enter</div>
    </div>

    <main id="main">
        <section id="profile-wrap">
            <div id="member-rank">
                <img
                    src="./baimed/assets/user.png"
                    alt="Member icon"
                    id="member-rank-icon"
                    onerror="this.onerror=null;this.src='https://website-1ir.pages.dev/assets/user.png';"
                />
                <span id="member-rank-tooltip">User: #1</span>
            </div>

            <div id="top-row">
                <div id="pfp-wrap">
                    <img id="pfp" src="./baimed/assets/pfp.gif" alt="Profile picture" />
                    <div id="profile-views" data-user="baimed">
                        <span class="views-eye">◉</span>
                        <span id="profile-views-count">...</span>
                    </div>
                </div>

                <div id="identity">
                    <div id="name-row">
                        <h1 id="username" data-text="Baimed"></h1>
                        <div id="badges">
                            <span class="badge badge-owner">
                                <img src="./baimed/assets/crown.png" alt="Owner badge" class="badge-icon" />
                                <span class="badge-tooltip">Owner</span>
                            </span>
                            <span class="badge badge-owner">
                                <img
                                    src="./baimed/assets/beta.png"
                                    alt="Beta badge"
                                    class="badge-icon"
                                    onerror="this.onerror=null;this.src='https://website-1ir.pages.dev/assets/beta.png';"
                                />
                                <span class="badge-tooltip">Beta</span>
                            </span>
                        </div>
                    </div>

                    <p id="status" data-text="i move different, that&rsquo;s the difference."></p>
                    <p id="joined" data-joined-date="2026-04-08">Joined today</p>
                </div>
            </div>

            <a
                id="social-card"
                href="https://discord.gg/hUXRZxkgjS"
                target="_blank"
                rel="noopener noreferrer"
                data-widget-url="https://discord.com/api/guilds/1492289955098263554/widget.json"
                data-fallback-invite="https://discord.gg/hUXRZxkgjS"
            >
                <div id="discord-left">
                    <div id="discord-icon">!</div>

                    <div id="discord-info">
                        <div id="discord-title-row">
                            <span id="discord-title">Not Found</span>
                            <span id="discord-label">Discord</span>
                        </div>

                        <div id="discord-subtext">
                            <span class="dot"></span>
                            <span>0 Online</span>
                            <span class="separator">•</span>
                            <span>0 Members</span>
                        </div>
                    </div>
                </div>

                <span id="join-wrap">
                    <span id="join-btn">Join</span>
                    <span id="discord-redirect-tooltip">Redirecting you to Discord</span>
                </span>
            </a>

            <div id="social-icons">
                <a href="#" id="discord-copy" aria-label="Discord">
                    <img src="./baimed/assets/discord.png" alt="Discord" />
                    <span id="discord-copy-tooltip">Copied Discord tag</span>
                </a>
                <a href="https://www.tiktok.com/@itsBaimed" id="tiktok-link" aria-label="TikTok">
                    <img src="./baimed/assets/tiktok.png" alt="TikTok" />
                    <span id="tiktok-redirect-tooltip">Redirecting you to TikTok</span>
                </a>
                <a href="https://instagram.com/heyitsaustin.lol" id="instagram-link" aria-label="Instagram">
                    <img src="./baimed/assets/instagram.png" alt="Instagram" />
                    <span id="instagram-redirect-tooltip">Redirecting you to Instagram</span>
                </a>
            </div>
        </section>
    </main>

    <script src="./baimed/effects.js"></script>
</body>
</html>
